Eerstejaarsbuddy:
  Wie: 
    "Eerstejaarsbuddy's van competitieploegen"
  Wanneer: 
    "Naar behoefte van de eerstejaars, tijdens vaste check-ins gedurende het volledige eerste jaar"
  Waarvoor: 
    "Alle zorgen of problemen die voorkomen in het eerste jaar, als problematiek rondom ploegvorming, studiestress, niet lekkerin je vel zitten"
  Wat: 
    "Dit zijn toebedeelde meerderejaars leden die door het jaar heen contact hebben met de eerstejaars competitieroeiers. 
    Het eerste jaar is ontzettend hectisch, de buddy’s zijn er om ze op een laagdrempelige manier over allerlei onderwerpen te hebben. 
    Voornamelijk thema’s die in het eerste jaar het meest relevant zijn, denk aan ploegvorming/dynamiek of studie. 
    Geen adviesfunctie, maar kan wel doorverwijzen naar andere contactpunten binnen of buiten Njord."

BuCo:
  Wie: 
    "Leden van de BuCo, bij voorkeur Teddie van der Putten"
  Wanneer: 
    "Iedereen van de BuCo is benaderbaar voor borrel gerelateerde problematiek, zoals dronkenschap, grensoverschrijdend gedrag, ruzies, etc."
  Waarvoor: 
    "Borrelgerelateerde problematiek, zoals (te) dronkenschap, ongewenst aanraken, ruzies"
  Wat: 
    "Ze bieden een luisterend oor en kunnen in overleg met Bestuur actie ondernemen. Het is mogelijk om in vertrouwen te spreken zonder dat er actie wordt ondernomen."
  Lidnummers: "22170"
CC:
  Wie: 
    "Leden van de CC, bij voorkeur Ella van Muiswinkel"
  Wanneer: 
    "Tijdens ploegvormingsactiviteiten, competitieweekenden, wedstrijden en andere CC-evenementen"
  Waarvoor: 
    "Problemen zoals dronkenschap, grensoverschrijdend gedrag, sfeer binnen de ploeg"
  Wat: 
    "Ze bieden een luisterend oor en kunnen in overleg met Bestuur actie ondernemen. Het is mogelijk om in vertrouwen te spreken zonder dat er actie wordt ondernomen."
  Lidnummers: "23186"
TopCommissie:
  Wie: 
    "Leden van de TopCommissie"
  Wanneer: 
    "Tijdens vaste check-ins met TopC4+, Club8+ en eerstejaars wedstrijdroeiers"
  Waarvoor: 
    "Het gaat hier om roeigerelateerde problematiek zoals prestatiedruk, voeding, relatie met coaches, ploegdynamiek en mentaal welzijn."
  Wat: 
    "Dit is een buddysysteem voor TopC4+, Club8+ en eerstejaars wedstrijdroeiers. Er wordt gekeken hoe iemand ondersteund kan worden binnen of buiten Njord."

Vertrouwenscontactpersonen:
  Wie:
    "- Intern (t/m november): Marlies Venderbos, David Lensen, Anouk de Jonge\n\n
    - Intern (vanaf midden november): Madelief Uljee, Jip de Buck, Denise van Velzen\n\n
    - Extern: Annemieke de Pater (psycholoog, niet-lid van Njord)"
  Wanneer: 
    "Altijd – voor iedereen met behoefte aan een vertrouwelijk gesprek"
  Waarvoor: 
    "Deze mensen staan altijd klaar voor iedereen die behoefte heeft aan een vertrouwelijk gesprek. 
    Het gaat hier over (seksueel) grensoverschrijdend gedrag, mentaal welzijn of andere persoonlijke problematiek."
  Wat: 
    "De interne VCP’s zijn actief op Njord en aanspreekbaar tijdens borrels of via mail. 
    De externe VCP staat buiten de vereniging, maar weet wel hoe Njord in elkaar zit en heeft veel ervaring als psycholoog.
    Zij geven geen advies maar kunnen doorverwijzen naar passende vervolgstappen. 
    Meldingen blijven vertrouwelijk en worden alleen met toestemming gedeeld, tenzij het gaat om een strafbaar feit."
  Contact: "app@njord.nl"

Bestuur:
  Wie: 
    "Het bestuur, met Huige en Noortje als portefeuillehouders voor mentaal welzijn en sociale veiligheid"
  Wanneer: 
    "Altijd benaderbaar tijdens alle activiteiten waar het bestuur aanwezig is, of via mail."
  Waarvoor: 
    "Het gaat hier om alle vormen van ongewenst gedrag of klachten over leden en externen op Njord. Ze kunnen handelen of doorverwijzen naar passende ondersteuning."
  Wat: 
    "Biedt een luisterend oor, kan handelen of doorverwijzen naar passende ondersteuning."
  Lidnummers: 
    ["21109", "22013"]

Counselor:
  Wie: 
    "Jet van Dijck is onze counselor. Bij haar kan je op afspraak gratis terecht."
  Wanneer: 
    "Ze heeft haar spreekuren op vrijdag van 10:00 tot 15:00 op de V.S.L. Catena in een aparte ruimte direct na de ingang."
  Waarvoor: 
    "Diverse persoonlijke problemen of mentale klachten"
  Wat: 
    "Ze biedt een vangnet en helpt met het vinden van passende vervolgstappen. 
    Geen behandeltraject, maar meerdere afspraken en doorverwijzing naar hulpinstanties zijn mogelijk."

Tuchtrechtspraak:
  Wie: 
    "Oort, van Geloven, Meijer, Hannah Otterloo, Chiara Soeters, Noordenbos, Beenders, 
    Lotte Dekker, Linden van 't Hoff"
  Wanneer: 
    "Iedereen kan contact opnemen via mail"
  Waarvoor: 
    "Het gaat hier om formele klachten zoals: (seksueel) overschrijdend gedrag of wangedrag van leden."
  Wat: 
    "Er is op Njord verschil  in onze tuchtrechtspraak tussen het Bestuur en de Raad. Het Bestuur ziet toe op de ‘alledaagse vergrijpen’ en kan versneld recht spreken. 
    Als het gecompliceerder wordt, is uitsluitend de Raad bevoegd recht te spreken. 
    In dat geval wordt er een melding gemaakt bij de Raad en besluit de Raad wel of niet een onderzoek te starten.
    Het Bestuur kan een klacht indienen bij de Raad, maar dit kan je ook zelf doen via raad@njord.nl."
  Contact: "raad@njord.nl"
